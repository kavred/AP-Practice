<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP History Study Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-71PYNPLB78"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-71PYNPLB78');
    </script>
</head>
<body>
    <div class="app-container">
        <div class="start-screen" id="startScreen">
            <div class="start-icon"><i class="fa-solid fa-graduation-cap"></i></div>
            <h1 class="start-title">AP History Study Tool</h1>
            <p class="start-desc">A modern, web-based flashcard tool to help you master the "Must Know" dates and events for AP European History!</p>
            <div class="mode-selector">
                <label for="modeSelect" style="display: flex; justify-content: flex-start; align-items: center; gap: 0.8vw;">
                    Select Study Mode:
                    <div class="info-tooltip">
                        <i class="fa-solid fa-circle-info"></i>
                        <div class="tooltip-text">
                            <strong>Normal:</strong> Standard randomized testing.<br>
                            <strong>Random Adaptive:</strong> Rigorous loop. Must correctly answer old & newest term twice without hints/mistakes before adding more.<br>
                            <strong>Chronological Adaptive:</strong> Same rigors as Random, but introducing new dates purely in timeline order.<br>
                            <strong>Forever:</strong> Endless randomized testing. Keeps looping questions until you manually end the session.
                        </div>
                    </div>
                </label>
                <select id="modeSelect">
                    <option value="normal">Normal</option>
                    <option value="forever">Forever Mode</option>
                    <option value="adaptive">Random Adaptive</option>
                    <option value="chronological-adaptive">Chronological Adaptive</option>
                </select>
            </div>
            <div class="period-selector">
                <label for="periodSelect">Select a Period to Practice:</label>
                <select id="periodSelect">
                    <option value="all">All Periods (1450 - present)</option>
                    <option value="flagged">Flagged Questions 🚩</option>
                    <option value="1">Period 1 (1450 - 1648)</option>
                    <option value="2">Period 2 (1648 - 1815)</option>
                    <option value="3">Period 3 (1815 - 1914)</option>
                    <option value="4">Period 4 (1914 - present)</option>
                </select>
            </div>
            <button class="btn btn-start" id="startBtn">
                <i class="fa-solid fa-play"></i> Start Studying
            </button>
        </div>

        <header class="top-bar hidden" id="topBar">
            <button class="btn-home" id="homeBtn" title="Return Home">
                <i class="fa-solid fa-house"></i>
            </button>
            <div class="timer-badge">
                <i class="fa-regular fa-clock"></i>
                <span id="timerText">00:00</span>
            </div>
            <div class="score-badge">
                <span class="score-label">Score:</span>
                <span id="percentText" class="percent-badge">0%</span>
                <span id="scoreText">0/0</span>
            </div>
        </header>

        <main class="flashcard-area hidden" id="flashcardArea">
            <div class="flashcard" id="flashcard">
                <div class="card-image">
                    <i class="fa-solid fa-landmark dome-icon"></i>
                </div>
                <h1 class="question-text" id="questionText">Loading...</h1>
                
                <div class="input-wrapper" style="position: relative; width: 100%;">
                    <input type="text" id="answerInput" placeholder="Enter the year..." autocomplete="off">
                    <div class="validation-error" id="validationError">Must be exactly 4 numbers</div>
                </div>
                <div class="hint-display" id="hintDisplay"></div>
            </div>
        </main>

        <footer class="controls hidden" id="controlsArea">
            <button class="btn btn-flag" id="flagBtn" title="Flag Question">
                <i class="fa-regular fa-flag"></i> Flag
            </button>
            <button class="btn btn-hint" id="hintBtn" title="Get a Hint">
                <i class="fa-solid fa-lightbulb"></i>
            </button>
            <button class="btn btn-check" id="checkBtn">
                <i class="fa-solid fa-magnifying-glass"></i> Check
            </button>
            <button class="btn btn-end hidden" id="endSessionBtn" title="End Session">
                <i class="fa-solid fa-stop"></i> End
            </button>
        </footer>
    </div>
    
    <div class="modal" id="finishModal">
        <div class="modal-content">
            <h2>Study Session Complete!</h2>
            <p>Final Score: <span id="finalScoreText"></span></p>
            <p>Time: <span id="finalTimeText"></span></p>
            <button class="btn btn-restart" id="restartBtn">Play Again</button>
        </div>
    </div>
    
    <div style="position: absolute; bottom: 2vh; right: 2vw; font-size: 1.5vmin; color: var(--text-muted); opacity: 0.6; pointer-events: none; font-weight: 500;">v03.01.01</div>

    <script src="app.js"></script>
</body>
</html>
